name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build with Gradle
        run: |
          if [ -n "${VERSION:-}" ]; then
            ./gradlew build -PpluginVersion="$VERSION" --no-daemon
          else
            ./gradlew build --no-daemon
          fi

      - name: Read plugin version
        id: version
        run: |
          if [ -n "${VERSION:-}" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(./gradlew -q printVersion --no-daemon)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: aicraft-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Aicraft v${{ steps.version.outputs.version }}
          files: build/libs/*.jar
          generate_release_notes: true
          make_latest: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-alpha') }}

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          set +e
          if [ -n "${VERSION:-}" ]; then
            output=$(./gradlew publish -PpluginVersion="$VERSION" --no-daemon 2>&1)
          else
            output=$(./gradlew publish --no-daemon 2>&1)
          fi
          status=$?
          echo "$output"
          if [ "$status" -ne 0 ]; then
            if echo "$output" | grep -qE '409|Conflict'; then
              echo "::warning::Version ${{ steps.version.outputs.version }} is already on GitHub Packages. Bump pluginVersion in gradle.properties to publish a new artifact."
              exit 0
            fi
            exit "$status"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
